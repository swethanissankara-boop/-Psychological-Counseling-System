<!DOCTYPE html>
<html>
<head>
    <title>🔐 Admin Login</title>
    <style>
        body { font-family: "Segoe UI", Arial, sans-serif; background: linear-gradient(135deg, #e74c3c, #c0392b); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .container { max-width: 400px; width: 100%; background: rgba(255,255,255,0.95); padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        input:focus { outline: none; border-color: #e74c3c; box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.2); }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .error-message { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px; border: 1px solid #f5c6cb; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>👨‍💼 Admin Login</h1>
        
        {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <input type="text" name="username" placeholder="Username" required autofocus>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">🔐 Login as Admin</button>
        </form>
        
        <p style="text-align: center; margin-top: 20px;">
            <a href="/" style="color: #3498db; text-decoration: none; font-weight: 500;">🔙 Back to Home</a>
        </p>
    </div>
</body>
</html>
