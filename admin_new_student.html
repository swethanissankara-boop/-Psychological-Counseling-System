<!DOCTYPE html>
<html>
<head>
    <title>➕ Create New Student - Admin</title>
    <style>
        body{font-family:"Segoe UI",Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
        .container{max-width:500px;width:100%;background:rgba(255,255,255,0.95);padding:40px;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,0.2);}
        .header{text-align:center;margin-bottom:30px;color:#2c3e50;}
        .form-group{margin-bottom:25px;}
        label{display:block;font-weight:600;color:#2c3e50;margin-bottom:8px;font-size:16px;}
        input,select{width:100%;padding:15px;border:2px solid #e1e8ed;border-radius:12px;font-size:16px;box-sizing:border-box;transition:all 0.3s;}
        input:focus,select:focus{outline:none;border-color:#3498db;box-shadow:0 0 0 3px rgba(52,152,219,0.1);}
        .submit-btn{width:100%;padding:18px;background:linear-gradient(135deg,#27ae60,#229954);color:white;border:none;border-radius:12px;font-size:18px;font-weight:600;cursor:pointer;transition:all 0.3s;}
        .submit-btn:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(39,174,96,0.4);}
        .back-btn{background:#3498db;color:white;padding:12px 24px;text-decoration:none;border-radius:10px;display:inline-block;margin-top:20px;}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>➕ Create New Student</h1>
            <p style="color:#7f8c8d;">Fill basic info → Assign JP → JP completes details</p>
        </div>
        
        <form method="POST">
            <div class="form-group">
                <label>Student's Name *</label>
                <input type="text" name="student_name" placeholder="Sharma" required>
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            </div>
            
            <div class="form-group">
                <label>Assign to JP *</label>
                <select name="jp_id" required>
                    <option value="">Select Junior Psychologist</option>
                    {% for jp in jps %}
                        <option value="{{ jp.id }}">{{ jp.username }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <button type="submit" class="submit-btn">✅ Create & Assign Student</button>
        </form>
        
        <a href="/admin/dashboard" class="back-btn">← Back to Dashboard</a>
    </div>
</body>
</html>
