<!DOCTYPE html>
<html>
<head>
    <title>Edit Issue #{{ issue.id }}</title>
    <style>
        body { font-family:"Segoe UI",Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; padding:20px; display:flex; justify-content:center; align-items:center; margin:0;}
        .container { max-width:600px; width:100%; background:rgba(255,255,255,0.95); border-radius:20px; padding:40px; box-shadow:0 15px 40px rgba(0,0,0,0.2); }
        h1 { color:#2c3e50; text-align:center; margin-bottom:30px; }
        input, select, textarea { width:100%; padding:12px; margin-bottom:15px; border:2px solid #e1e8ed; border-radius:8px; box-sizing:border-box; }
        .btn-group { display:flex; gap:10px; margin-top:20px; }
        .submit-btn { background:#27ae60; color:white; padding:15px; border:none; border-radius:10px; flex:1; cursor:pointer; font-size:16px; font-weight:bold; }
        .cancel-btn { background:#95a5a6; color:white; padding:15px; text-decoration:none; border-radius:10px; text-align:center; flex:1; font-size:16px; font-weight:bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✏️ Update Issue Status</h1>
        
        <form method="POST">
            {{ form.hidden_tag() }}
            
            <label><b>Issue Name</b></label>
            {{ form.issue_name() }}
            
            <div style="display:flex; gap:15px;">
                <div style="flex:1;">
                    <label><b>Issue Type</b></label>
                    {{ form.issue_type() }}
                </div>
                <div style="flex:1;">
                    <label><b>Status (Change to Resolved here!)</b></label>
                    {{ form.issue_status() }}
                </div>
            </div>
            
            <label><b>Description</b></label>
            {{ form.issue_description(rows="4") }}
            
            <div style="display:none;">
                {{ form.issue_date(value=issue.issue_date.strftime('%Y-%m-%d') if issue.issue_date else '') }}
            </div>
            
            <div class="btn-group">
                <button type="submit" class="submit-btn">💾 Save Changes</button>
                <a href="/student/{{ student.id }}/issues" class="cancel-btn">Cancel</a>
            </div>
        </form>
        
    </div>
</body>
</html>
